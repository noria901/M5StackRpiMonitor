<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPi Monitor - Settings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }
        header h1 {
            color: #00d4ff;
            font-size: 1.8em;
            margin-bottom: 8px;
        }
        header p {
            color: #888;
            font-size: 0.9em;
        }
        nav {
            text-align: center;
            margin-bottom: 24px;
        }
        nav a {
            color: #00d4ff;
            text-decoration: none;
            margin: 0 12px;
            padding: 6px 16px;
            border: 1px solid #333;
            border-radius: 4px;
            transition: background 0.2s;
        }
        nav a:hover, nav a.active {
            background: #0f3460;
        }
        .section {
            background: #16213e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .section h2 {
            color: #00d4ff;
            font-size: 1.1em;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            color: #aaa;
            font-size: 0.85em;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            max-width: 400px;
            padding: 10px;
            background: #1a1a2e;
            border: 1px solid #444;
            border-radius: 4px;
            color: #fff;
            font-size: 1em;
        }
        .form-group input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .form-group .hint {
            color: #666;
            font-size: 0.8em;
            margin-top: 4px;
        }
        .form-group .current {
            color: #888;
            font-size: 0.85em;
            margin-top: 4px;
            font-family: monospace;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-save {
            background: #00d4ff;
            color: #000;
        }
        .toast {
            display: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 0.85em;
            margin-top: 12px;
        }
        .toast.success {
            display: block;
            background: #0a3d0a;
            color: #4caf50;
            border: 1px solid #4caf50;
        }
        .toast.error {
            display: block;
            background: #3d0a0a;
            color: #ff4444;
            border: 1px solid #ff4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>RPi Monitor</h1>
            <p>Settings</p>
        </header>

        <nav>
            <a href="/">Devices</a>
            <a href="/flash">Flash</a>
            <a href="/deploy">Deploy</a>
            <a href="/commands">Commands</a>
            <a href="/settings" class="active">Settings</a>
        </nav>

        <div class="section">
            <h2>BLE Configuration</h2>
            <div class="form-group">
                <label for="ble-name">BLE Advertising Name</label>
                <input type="text" id="ble-name"
                       value="{{ config.get('ble_name', '') }}"
                       placeholder="(auto-detect: RPi-Monitor / Jetson-Monitor)"
                       maxlength="32">
                <div class="hint">
                    M5Stack のスキャン時に表示される名前です。
                    空欄の場合はプラットフォームに応じて自動設定されます。
                </div>
                <div class="current">
                    現在の設定: {{ config.get('ble_name', '(自動検出)') }}
                </div>
            </div>
            <button class="btn btn-save" id="btn-save" onclick="saveBLEName()">Save</button>
            <div class="toast" id="toast"></div>
            <div class="hint" style="margin-top: 12px; color: #d29922;">
                変更を反映するにはデーモンの再起動が必要です:<br>
                <code style="color:#aaa;">sudo systemctl restart rpi-monitor</code>
            </div>
        </div>
    </div>

    <script>
        async function saveBLEName() {
            const btn = document.getElementById('btn-save');
            const toast = document.getElementById('toast');
            const name = document.getElementById('ble-name').value.trim();

            btn.disabled = true;
            toast.className = 'toast';
            toast.style.display = 'none';

            try {
                const resp = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ble_name: name })
                });
                const data = await resp.json();
                if (resp.ok) {
                    toast.className = 'toast success';
                    toast.textContent = name
                        ? `BLE名を「${name}」に設定しました。デーモンを再起動してください。`
                        : 'BLE名を自動検出に戻しました。デーモンを再起動してください。';
                } else {
                    toast.className = 'toast error';
                    toast.textContent = data.message || 'Error';
                }
            } catch (err) {
                toast.className = 'toast error';
                toast.textContent = 'Connection error: ' + err.message;
            }
            btn.disabled = false;
        }

        document.getElementById('ble-name').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') saveBLEName();
        });
    </script>
</body>
</html>
